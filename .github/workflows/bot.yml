name: Axora Bot Runner

on:
  workflow_dispatch: # This adds the "Run workflow" button
  schedule:
    - cron: '0 */6 * * *' # Automatically triggers every 6 hours

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py python-dotenv

      - name: Start Axora Bot
        env:
          TOKEN: ${{ secrets.TOKEN }} # Pulls your secret token from GitHub Settings
        run: python bot.py
        
