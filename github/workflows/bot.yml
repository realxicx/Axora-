name: Axora Bot Runner

on:
  workflow_dispatch: # This allows you to start the bot MANUALLY with a button
  schedule:
    - cron: '0 */6 * * *' # This tries to start it every 6 hours automatically

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install discord.py python-dotenv

      - name: Run Bot
        env:
          TOKEN: ${{ secrets.TOKEN }} # This pulls your token from GitHub Secrets
        run: python main.py
        
